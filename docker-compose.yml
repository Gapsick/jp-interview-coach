# ============================================================
# Docker Compose - 프론트엔드 + 백엔드를 한번에 실행
#
# 사용법:
#   docker-compose up --build        (빌드 + 실행)
#   docker-compose up -d             (백그라운드 실행)
#   docker-compose down              (중지)
#
# 접속: http://localhost (80 포트)
# ============================================================

services:
  # ---- 백엔드: Express API 서버 ----
  backend:
    build: ./backend
    container_name: interview-backend
    ports:
      - "3000:3000"           # 백엔드 직접 접근용 (디버깅 시)
    environment:
      - PORT=3000
      - OPENAI_API_KEY=${OPENAI_API_KEY}   # .env 파일에서 읽어옴
      - JWT_SECRET=${JWT_SECRET:-interview-coach-secret-key-2026}
      # Docker(Linux)에서는 ffmpeg가 시스템에 설치되므로 경로 지정 불필요
      # - FFMPEG_PATH=  (비워두면 시스템 PATH에서 자동 탐색)
    volumes:
      # data, uploads 폴더를 호스트와 공유 (컨테이너 재시작 시에도 데이터 유지)
      - backend-data:/app/data
      - backend-uploads:/app/uploads
    restart: unless-stopped

  # ---- 프론트엔드: nginx + Vue 빌드 결과물 ----
  frontend:
    build: ./frontend
    container_name: interview-frontend
    ports:
      - "80:80"               # http://localhost 로 접속
    depends_on:
      - backend               # 백엔드가 먼저 시작된 후 프론트엔드 시작
    restart: unless-stopped

# 데이터 영속화를 위한 Docker 볼륨
volumes:
  backend-data:       # 사용자/세션 JSON 데이터
  backend-uploads:    # 업로드된 오디오/비디오 파일
