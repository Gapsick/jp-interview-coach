# ============================================================
# nginx 설정 파일
#
# 역할:
# 1. 프론트엔드 정적 파일(HTML, JS, CSS) 서빙
# 2. /api 요청을 백엔드 컨테이너(backend:3000)로 프록시
# 3. Vue Router의 SPA 라우팅 지원 (모든 경로 → index.html)
# ============================================================

server {
    listen 80;

    # 프론트엔드 정적 파일 서빙
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        # SPA 라우팅: 존재하지 않는 경로는 index.html로 (Vue Router용)
        try_files $uri $uri/ /index.html;
    }

    # /api 요청은 백엔드 컨테이너로 프록시
    # docker-compose에서 backend 서비스 이름으로 접근 가능
    location /api {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # 파일 업로드를 위해 최대 요청 크기 늘림 (오디오/비디오 파일)
        client_max_body_size 50M;
    }
}
